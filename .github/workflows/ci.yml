name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - Prisma validate, typecheck, build
    runs-on: ubuntu-latest
    env:
      # Prisma only needs a syntactically valid database URL for schema validation.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
      JWT_SECRET: ci-secret-for-typecheck-only
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Typecheck backend
        run: npm run typecheck

      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend - lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fitness-ai-coach:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
