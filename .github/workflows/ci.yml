name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (typecheck + Prisma validate + build)
    runs-on: ubuntu-latest

    env:
      # Prisma needs a valid URL format for `prisma validate` even without a
      # real DB — we point it at a dummy postgres connection.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
      JWT_SECRET: ci-secret-for-typecheck-only
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Typecheck backend
        run: npx tsc --noEmit

      - name: Build backend
        run: npm run build

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  # ── Docker build smoke-test ────────────────────────────────────────────────
  docker:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    # Only run on pushes to main/master to save CI minutes
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fitness-ai-coach:ci
          # Cache layers between runs to speed up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
